name: Java Integration Tests Maven 4.0.0-rc-5

on: [push, pull_request]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  maven-version: 4.0.0-rc-5

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Integration Tests Maven 4.0.0-rc-5 with java 25

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          cache: maven
          distribution: zulu
          java-version: 25
      - name: Create Maven toolchains
        run: |
          JAVA_SPEC_VER=$(java -XshowSettings:property 2>&1 | grep 'java.specification.version' | awk '{print $NF}')
          mkdir -p "${HOME}/.m2"
          cat > "${HOME}/.m2/toolchains.xml" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <toolchains>
            <toolchain>
              <type>jdk</type>
              <provides>
                <version>${JAVA_SPEC_VER}</version>
              </provides>
              <configuration>
                <jdkHome>${JAVA_HOME}</jdkHome>
              </configuration>
            </toolchain>
          </toolchains>
          EOF
      - name: Set Maven Wrapper version ${{ env.maven-version }}
        run: sed -i "s|^distributionUrl=.*|distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/${{ env.maven-version }}/apache-maven-${{ env.maven-version }}-bin.zip|" .mvn/wrapper/maven-wrapper.properties
      - name: Disable Maven Wrapper checksum validation
        run: sed -i '/distributionSha256Sum/d' .mvn/wrapper/maven-wrapper.properties
      - name: Integration Test with Maven ${{ env.maven-version }}
        run: ./mvnw verify --batch-mode --no-transfer-progress --show-version -Dinvoker.parallelThreads=8 -Dlicense.skip=true -Dmaven=${{ env.maven-version }} -Dmaven.min-version=${{ env.maven-version }} -DtestSrc=remote -Prun-its
