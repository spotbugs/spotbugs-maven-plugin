name: Java Integration Tests Maven 3.8.9

on: [push, pull_request]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  maven-version: 3.8.9

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30
    name: Integration Tests Maven 3.8.9 with java 21

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          cache: maven
          distribution: zulu
          java-version: 21
      - name: Set Maven Wrapper version ${{ env.maven-version }}
        run: sed -i "s|^distributionUrl=.*|distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/${{ env.maven-version }}/apache-maven-${{ env.maven-version }}-bin.zip|" .mvn/wrapper/maven-wrapper.properties
      - name: Set 'project.basedir' to 'basedir' for more broad maven ${{ env.maven-version }} support
        run: sed -i "s|project.basedir|basedir|" pom.xml
      - name: Disable Maven Wrapper checksum validation
        run: sed -i '/distributionSha256Sum/d' .mvn/wrapper/maven-wrapper.properties
      - name: Integration Test with Maven
        run: ./mvnw verify --batch-mode --no-transfer-progress --show-version -D"invoker.parallelThreads=8" -D"license.skip=true" -D"maven=${{ env.maven-version }}" -D"maven.min-version=${{ env.maven-version }}" -D"git-commit.plugin=9.0.2" -DtestSrc=remote -Prun-its
